stages:
  - build
  - deploy

build:
  stage: build
  image: node:18
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/

deploy:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying to production"
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_BASE64" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
    - chmod 600 ~/.ssh/config
    - rsync -avz --delete frontend/dist/ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH
  only:
    - main
  when: manual
