root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -mod=vendor -o ./tmp/ai_chat_service ."
  bin = "./tmp/ai_chat_service"
  delay = 100
  stop_on_error = true
  send_interrupt = false
  include_dir = ["."]
  exclude_dir = ["tmp", "vendor", "venv", "__pycache__", "bin"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_regex = ["_test.go"]
  log = "build-errors.log"
  args_bin = []

[log]
  time = true
  main_only = false

[misc]
  clean_on_exit = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
  app = "white"

[proxy]
  enabled = false

[env]
  AI_CHAT_PORT = ":5002"

