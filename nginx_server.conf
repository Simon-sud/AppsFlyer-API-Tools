server {
    listen 80;
    server_name 8.222.149.42 www.afgo-workbench.icu;

    # === 新增：性能优化配置 ===
    
    # 启用tcp优化（sendfile已在全局配置中定义）
    tcp_nopush on;
    tcp_nodelay on;
    
    # 连接优化
    keepalive_timeout 65;
    keepalive_requests 100;
    
    # 客户端缓冲区优化
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # 启用gzip压缩（增强现有配置）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2
        application/font-woff
        application/font-woff2;

    # 安全相关 HTTP 头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    server_tokens off;
    client_max_body_size 10M;

    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    root /opt/AppsFlyer_RAWDATA_WEB2_Update/frontend/build;
    index index.html;

    # 1. Socket.IO WebSocket 代理（最高优先级）
    location = /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
    location ~ ^/socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # === 新增：字体文件优化 ===
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        add_header Access-Control-Allow-Origin "*";
        
        # 启用gzip_static
        gzip_static on;
    }
    
    # === 新增：图片文件优化 ===
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # 启用gzip_static
        gzip_static on;
    }

    # 静态文件缓存和gzip压缩（优化版本）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;  # 从30d提升到1y
        add_header Cache-Control "public, immutable";  # 添加immutable
        add_header Vary Accept-Encoding;  # 添加Vary头
        try_files $uri =404;
        
        # 启用gzip_static（如果文件已预压缩）
        gzip_static on;
        
        # 添加类型头
        location ~* \.(js)$ {
            add_header Content-Type "application/javascript; charset=utf-8";
        }
        location ~* \.(css)$ {
            add_header Content-Type "text/css; charset=utf-8";
        }
    }

    # 忽略隐藏文件
    location ~ /\. {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.html;
        
        # === 新增：HTML文件缓存优化 ===
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Vary Accept-Encoding;
        
        # === 新增：安全头增强 ===
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";
    }

    # 后端API配置
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # CORS 配置（显式列出域名和头部，兼容带凭证请求）
        add_header 'Access-Control-Allow-Origin' 'http://www.afgo-workbench.icu' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Origin,Accept,X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        # 处理 OPTIONS 请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'http://www.afgo-workbench.icu' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Origin,Accept,X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # 健康检查
    location /api/health {
        proxy_pass http://127.0.0.1:5000/health;
        access_log off;
    }
    
    # === 新增：静态资源目录优化 ===
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        gzip_static on;
    }
    
    # === 新增：阻止访问备份和临时文件 ===
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # === 新增：Nginx状态监控 ===
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
    
    # === 新增：资源预加载支持 ===
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
        # 为预加载的资源添加特殊头
        add_header Link "</static/js/main.js>; rel=preload; as=script" always;
        add_header Link "</static/css/main.css>; rel=preload; as=style" always;
    }
} 