# GitLab CI/CD 配置文件
# 用于自动化构建和部署前端项目

stages:
  - install
  - build
  - deploy

# 缓存配置
cache:
  paths:
    - node_modules/
    - frontend/node_modules/

# 安装依赖阶段
install_dependencies:
  stage: install
  image: node:18
  script:
    - cd frontend
    - npm ci --only=production
  artifacts:
    paths:
      - frontend/node_modules/
    expire_in: 1 hour
  only:
    - main
    - develop

# 构建阶段
build_frontend:
  stage: build
  image: node:18
  dependencies:
    - install_dependencies
  script:
    - cd frontend
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  only:
    - main
    - develop

# 部署到生产环境 (main分支)
deploy_production:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build_frontend
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_BASE64" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
    - chmod 600 ~/.ssh/config
  script:
    - rsync -avz --delete frontend/dist/ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH
    - echo "部署完成: $(date)"
  environment:
    name: production
    url: $DEPLOY_URL
  only:
    - main
  when: manual

# 部署到测试环境 (develop分支)
deploy_staging:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build_frontend
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY_STAGING_BASE64" | base64 -d | ssh-add -
    - mkdir -p ~/.ssh
    - echo "StrictHostKeyChecking no" >> ~/.ssh/config
    - chmod 600 ~/.ssh/config
  script:
    - rsync -avz --delete frontend/dist/ $DEPLOY_USER_STAGING@$DEPLOY_HOST_STAGING:$DEPLOY_PATH_STAGING
    - echo "测试环境部署完成: $(date)"
  environment:
    name: staging
    url: $DEPLOY_URL_STAGING
  only:
    - develop
  when: manual

# 代码质量检查
code_quality:
  stage: install
  image: node:18
  script:
    - cd frontend
    - npm ci
    - npm run lint
    - npm run test
  only:
    - main
    - develop
  allow_failure: true
