<!DOCTYPE html>
<html lang="en" translate="no">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, minimum-scale=1, user-scalable=yes, viewport-fit=cover" />
    <meta name="theme-color" content="#722ED1" />
    <meta name="google" content="notranslate" />
    <script>
      // 在页面加载的最早期检测浏览器类型，确保CSS修复立即生效
      (function() {
        if (typeof document === 'undefined') return;
        const userAgent = navigator.userAgent;
        const isEdge = /Edg/.test(userAgent);
        const isChrome = /Chrome/.test(userAgent) && !isEdge;
        
        if (isChrome) {
          document.documentElement.classList.add('browser-chrome');
        } else if (isEdge) {
          document.documentElement.classList.add('browser-edge');
        }
      })();
    </script>
    <meta name="description" content="Quick API Tools" />
    <meta property="og:title" content="ADNEXUS" />
    <meta property="og:description" content="Quick API Tools" />
    <meta property="og:type" content="website" />

    
    <style>
      /* 为favicon添加圆角效果 */
      link[rel="icon"] {
        border-radius: 8px;
      }
      
      /* 为页面中的logo图片添加圆角 */
      img[src*="logo"], img[src*="favicon"] {
        border-radius: 8px;
      }
      
      /* 为应用内的logo组件添加圆角 */
      .logo, .app-logo, .brand-logo {
        border-radius: 8px;
      }
    </style>
    
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>ADNEXUS</title>
  </head>
  <body translate="no">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
